<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Apuração 2026 - Horizontal</title>
    <link rel="stylesheet" href="/css/horizontal.css">
</head>
<body>
    <div class="widget-horizontal">
        <div class="bloco-header">
            <h2>Apuração 2026</h2>
            <div class="controles">
                <select id="select-turno" class="sel-turno" onchange="atualizarApuracao()">
                    <option value="1">1º</option>
                    <option value="2">2º</option>
                </select>
                <select id="select-cargo" class="sel-cargo" onchange="atualizarApuracao()">
                    <option value="1">Presidente</option>
                    <option value="3">Governador</option>
                    <option value="5">Senador</option>
                    <option value="6">Dep. Federal</option>
                    <option value="7">Dep. Estadual</option>
                </select>
                <select id="select-uf" class="sel-uf" onchange="atualizarApuracao()">
                    <option value="br">BR</option>
                    <option value="ac">AC</option>
                    <option value="al">AL</option>
                    <option value="ap">AP</option>
                    <option value="am">AM</option>
                    <option value="ba">BA</option>
                    <option value="ce">CE</option>
                    <option value="df">DF</option>
                    <option value="es">ES</option>
                    <option value="go">GO</option>
                    <option value="ma">MA</option>
                    <option value="mt">MT</option>
                    <option value="ms">MS</option>
                    <option value="mg">MG</option>
                    <option value="pa">PA</option>
                    <option value="pb">PB</option>
                    <option value="pr">PR</option>
                    <option value="pe">PE</option>
                    <option value="pi">PI</option>
                    <option value="rj">RJ</option>
                    <option value="rn">RN</option>
                    <option value="rs">RS</option>
                    <option value="ro">RO</option>
                    <option value="rr">RR</option>
                    <option value="sc">SC</option>
                    <option value="sp">SP</option>
                    <option value="se">SE</option>
                    <option value="to">TO</option>
                </select>
            </div>
        </div>

        <div class="bloco-status">
            <div class="status-topo">
                <span>Urnas Apuradas</span>
                <span id="txt-percurso">0,00%</span>
            </div>
            <div class="barra-total-bg">
                <div id="barra-percurso" class="barra-total-fill"></div>
            </div>
            <span id="ultima-atualizacao" class="data-hora">Conectando...</span>
        </div>

        <div id="lista-candidatos" class="bloco-carrossel">
            <span class="loading-msg">Buscando dados no TSE...</span>
        </div>
    </div>
    <script src="/js/horizontal.js"></script>
</body>
</html>
